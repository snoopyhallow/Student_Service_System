<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — UCC Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-col">
    <header class="topbar" id="topbar"></header>
    <div class="page-body">

      <div class="page-header">
        <div><h1>My Profile</h1><p>Manage your account information.</p></div>
      </div>

      <div id="flash" class="flash hidden"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:22px;max-width:860px;">

        <!-- Personal Info -->
        <div class="card">
          <div class="card-header"><h2>Personal Information</h2></div>
          <div class="card-body">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="full_name" class="form-control">
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="email" class="form-control" disabled>
              <div class="form-hint">Email cannot be changed.</div>
            </div>
            <div class="form-group">
              <label>Student / Staff ID</label>
              <input type="text" id="student_id" class="form-control" disabled>
            </div>
            <div id="student-fields">
              <div class="form-group">
                <label>Course</label>
                <input type="text" id="course" class="form-control" disabled>
              </div>
              <div class="form-group">
                <label>Year Level</label>
                <input type="text" id="year_level" class="form-control" disabled>
              </div>
            </div>
            <div class="form-group">
              <label>Contact Number</label>
              <input type="text" id="contact_no" class="form-control" placeholder="09XXXXXXXXX">
            </div>
            <div class="form-group">
              <label>Role</label>
              <span id="role-badge"></span>
            </div>
            <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
          </div>
        </div>

        <!-- Change Password -->
        <div class="card" style="align-self:start;">
          <div class="card-header"><h2>Change Password</h2></div>
          <div class="card-body">
            <div class="form-group">
              <label>Current Password</label>
              <input type="password" id="cur_pw" class="form-control" placeholder="••••••••">
            </div>
            <div class="form-group">
              <label>New Password</label>
              <input type="password" id="new_pw" class="form-control" placeholder="Min. 6 characters">
            </div>
            <div class="form-group">
              <label>Confirm New Password</label>
              <input type="password" id="conf_pw" class="form-control" placeholder="Repeat new password">
            </div>
            <button class="btn btn-primary" onclick="changePassword()">Change Password</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
const user = SESSION.get();
if (!user) { window.location.href='login.html'; }
else {
  renderSidebar(user.role,'profile.html');
  renderTopbar('My Profile');

  document.getElementById('full_name').value  = user.full_name;
  document.getElementById('email').value      = user.email;
  document.getElementById('student_id').value = user.student_id || '—';
  document.getElementById('contact_no').value = user.contact_no || '';
  document.getElementById('role-badge').innerHTML = `<span class="pill pill-${user.role}">${capitalize(user.role)}</span>`;

  if (user.role === 'student') {
    document.getElementById('course').value     = user.course || '—';
    document.getElementById('year_level').value = user.year_level ? `Year ${user.year_level}` : '—';
  } else {
    document.getElementById('student-fields').style.display='none';
  }
}

function saveProfile() {
  const name = document.getElementById('full_name').value.trim();
  const contact = document.getElementById('contact_no').value.trim();
  if (!name) { showFlash('Full name is required.','error'); return; }

  const rec = MOCK.users.find(u=>u.user_id===user.user_id);
  if (rec) { rec.full_name=name; rec.contact_no=contact; }
  user.full_name=name; user.contact_no=contact;
  SESSION.set(user);
  renderSidebar(user.role,'profile.html');
  showFlash('Profile updated successfully.','success');
}

function changePassword() {
  const cur  = document.getElementById('cur_pw').value;
  const nw   = document.getElementById('new_pw').value;
  const conf = document.getElementById('conf_pw').value;
  if (!cur || !nw) { showFlash('Please fill all password fields.','error'); return; }
  if (cur !== user.password) { showFlash('Current password is incorrect.','error'); return; }
  if (nw.length < 6) { showFlash('New password must be at least 6 characters.','error'); return; }
  if (nw !== conf) { showFlash('Passwords do not match.','error'); return; }

  const rec = MOCK.users.find(u=>u.user_id===user.user_id);
  if (rec) rec.password=nw;
  user.password=nw; SESSION.set(user);
  document.getElementById('cur_pw').value='';
  document.getElementById('new_pw').value='';
  document.getElementById('conf_pw').value='';
  showFlash('Password changed successfully.','success');
}
</script>
</body>
</html>
