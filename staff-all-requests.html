<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Requests — UCC Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-col">
    <header class="topbar" id="topbar"></header>
    <div class="page-body">

      <div class="page-header">
        <div><h1>All Requests</h1><p>Complete history of all document requests.</p></div>
      </div>

      <div class="card">
        <div class="filter-bar">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" class="form-control" placeholder="Search...">
          </div>
          <select id="sf" class="form-control" style="width:160px;" onchange="renderTable()">
            <option value="">All Status</option>
            <option value="pending">Pending</option>
            <option value="processing">Processing</option>
            <option value="ready">Ready</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Reference No.</th><th>Student</th><th>Document</th>
              <th>Date Submitted</th><th>Status</th><th>Processed By</th><th>Action</th>
            </tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
const user = requireLogin('staff');
if (user) {
  renderSidebar('staff','staff-all-requests.html');
  renderTopbar('All Requests');
  document.getElementById('search').addEventListener('input', renderTable);
  renderTable();
}

function renderTable() {
  const q=document.getElementById('search').value.toLowerCase();
  const sf=document.getElementById('sf').value;
  let reqs=[...MOCK.requests].sort((a,b)=>new Date(b.date_submitted)-new Date(a.date_submitted));
  if(sf) reqs=reqs.filter(r=>r.status===sf);
  if(q)  reqs=reqs.filter(r=>{const s=DB.user(r.student_id);const dt=DB.docType(r.doc_type_id);return(r.reference_no+' '+(s?.full_name||'')+' '+(dt?.type_name||'')).toLowerCase().includes(q);});
  const tbody=document.getElementById('tbody');
  if(!reqs.length){tbody.innerHTML=`<tr><td colspan="7"><div class="empty-state"><p>No requests found.</p></div></td></tr>`;return;}
  tbody.innerHTML=reqs.map(r=>{
    const s=DB.user(r.student_id);const dt=DB.docType(r.doc_type_id);const proc=r.processed_by?DB.user(r.processed_by):null;
    return `<tr>
      <td class="td-ref">${r.reference_no}</td>
      <td><div class="td-name-primary">${s?.full_name||'—'}</div><div class="td-name-secondary">${s?.student_id||''}</div></td>
      <td>${dt?.type_name||'—'}</td>
      <td>${fmtDate(r.date_submitted)}</td>
      <td>${pillHtml(r.status)}</td>
      <td class="text-muted text-sm">${proc?.full_name||'—'}</td>
      <td><a href="request-detail.html?id=${r.request_id}" class="btn btn-secondary btn-sm">View</a></td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
