<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users — UCC Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-col">
    <header class="topbar" id="topbar"></header>
    <div class="page-body">

      <div class="page-header">
        <div><h1>Manage Users</h1><p>Manage student and staff accounts.</p></div>
        <button class="btn btn-primary" onclick="openModal('add-modal')">➕ Add User</button>
      </div>

      <div id="flash" class="flash hidden"></div>

      <div class="card">
        <div class="filter-bar">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" class="form-control" placeholder="Search name, email, ID...">
          </div>
          <select id="role-filter" class="form-control" style="width:150px;">
            <option value="">All Roles</option>
            <option value="student">Student</option>
            <option value="staff">Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Name</th><th>ID</th><th>Email</th><th>Role</th>
              <th>Course</th><th>Year</th><th>Status</th><th class="text-right">Actions</th>
            </tr></thead>
            <tbody id="user-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add User Modal -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2>Add New User</h2>
      <button class="modal-close" data-close="add-modal">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group full-width">
          <label>Full Name <span class="required">*</span></label>
          <input type="text" id="add-name" class="form-control">
        </div>
        <div class="form-group">
          <label>Role <span class="required">*</span></label>
          <select id="add-role" class="form-control">
            <option value="student">Student</option>
            <option value="staff">Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label>ID <span class="required">*</span></label>
          <input type="text" id="add-sid" class="form-control" placeholder="2024-00123 or STAFF-001">
        </div>
        <div class="form-group">
          <label>Email <span class="required">*</span></label>
          <input type="email" id="add-email" class="form-control">
        </div>
        <div class="form-group">
          <label>Course</label>
          <input type="text" id="add-course" class="form-control" placeholder="BSIT, BSCS...">
        </div>
        <div class="form-group">
          <label>Year Level</label>
          <select id="add-year" class="form-control">
            <option value="">N/A</option>
            <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
          </select>
        </div>
        <div class="form-group full-width">
          <label>Default Password</label>
          <input type="text" id="add-pw" class="form-control" value="password">
          <div class="form-hint">User should change this after first login.</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="add-modal">Cancel</button>
      <button class="btn btn-primary" onclick="addUser()">Add User</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
const user = requireLogin('admin');
if (user) {
  renderSidebar('admin','admin-users.html');
  renderTopbar('Manage Users');
  document.getElementById('search').addEventListener('input', renderTable);
  document.getElementById('role-filter').addEventListener('change', renderTable);
  renderTable();
}

function renderTable() {
  const q  = document.getElementById('search').value.toLowerCase();
  const rf = document.getElementById('role-filter').value;
  let users = MOCK.users;
  if (rf) users = users.filter(u=>u.role===rf);
  if (q)  users = users.filter(u=>(u.full_name+' '+u.email+' '+(u.student_id||'')).toLowerCase().includes(q));

  const tbody = document.getElementById('user-tbody');
  tbody.innerHTML = users.map(u=>`<tr>
    <td><div class="td-name-primary">${u.full_name}</div></td>
    <td class="text-muted text-sm">${u.student_id||'—'}</td>
    <td class="text-sm">${u.email}</td>
    <td>${pillHtml(u.role)}</td>
    <td class="text-muted text-sm">${u.course||'—'}</td>
    <td class="text-muted text-sm">${u.year_level?'Y'+u.year_level:'—'}</td>
    <td><span class="pill ${u.is_active?'pill-active':'pill-inactive'}">${u.is_active?'Active':'Inactive'}</span></td>
    <td class="text-right" style="white-space:nowrap;">
      <button class="btn btn-secondary btn-sm" onclick="toggleUser(${u.user_id})">${u.is_active?'🚫 Deactivate':'✅ Activate'}</button>
      ${u.user_id!==user.user_id?`<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.user_id})">🗑</button>`:''}
    </td>
  </tr>`).join('');
}

function toggleUser(id) {
  const u = MOCK.users.find(u=>u.user_id===id);
  if (!u) return;
  u.is_active = u.is_active ? 0 : 1;
  renderTable();
  showFlash(`User ${u.is_active?'activated':'deactivated'}.`);
}

function deleteUser(id) {
  if (!confirm('Delete this user? This cannot be undone.')) return;
  const idx = MOCK.users.findIndex(u=>u.user_id===id);
  if (idx > -1) { MOCK.users.splice(idx,1); renderTable(); showFlash('User deleted.'); }
}

function addUser() {
  const name  = document.getElementById('add-name').value.trim();
  const role  = document.getElementById('add-role').value;
  const sid   = document.getElementById('add-sid').value.trim();
  const email = document.getElementById('add-email').value.trim();
  const course= document.getElementById('add-course').value.trim();
  const year  = parseInt(document.getElementById('add-year').value)||0;
  const pw    = document.getElementById('add-pw').value||'password';

  if (!name||!sid||!email) { showFlash('Please fill all required fields.','error'); return; }
  if (MOCK.users.find(u=>u.email.toLowerCase()===email.toLowerCase())) {
    showFlash('Email already exists.','error'); return;
  }

  MOCK.users.push({ user_id:Date.now(), student_id:sid, full_name:name, email, password:pw,
    role, course, year_level:year, contact_no:'', is_active:1, created_at:new Date().toISOString() });

  closeModal('add-modal');
  renderTable();
  showFlash('User added successfully.');
}
</script>
</body>
</html>
