<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — UCC Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-col">
    <header class="topbar" id="topbar"></header>
    <div class="page-body">

      <div class="page-header">
        <div><h1>Reports & Analytics</h1><p>System performance and request statistics.</p></div>
      </div>

      <div class="summary-grid" id="sum"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;">
        <div class="card">
          <div class="card-body">
            <h2 style="margin-bottom:20px;">Requests by Status</h2>
            <div id="status-prog"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-body">
            <h2 style="margin-bottom:20px;">Monthly Trend</h2>
            <div class="chart-bars" id="bar-chart"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h2>Revenue by Document Type (Completed Requests)</h2></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Document Type</th><th>Completed</th><th>Revenue</th></tr></thead>
            <tbody id="rev-tbody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
const user = requireLogin('admin');
if (user) {
  renderSidebar('admin','admin-reports.html');
  renderTopbar('Reports & Analytics');

  const reqs = MOCK.requests;
  const comp = reqs.filter(r=>r.status==='completed');
  const pend = reqs.filter(r=>r.status==='pending').length;
  const proc = reqs.filter(r=>r.status==='processing').length;
  const canc = reqs.filter(r=>r.status==='cancelled').length;
  const rej  = reqs.filter(r=>r.status==='rejected').length;

  const totalRev = comp.reduce((sum,r)=>{ const dt=DB.docType(r.doc_type_id); return sum+(dt?dt.fee*r.quantity:0); },0);

  document.getElementById('sum').innerHTML = `
    <div class="summary-card green"><div class="sc-icon">💰</div><div class="sc-value" style="font-size:22px;">${fmtMoney(totalRev)}</div><div class="sc-label">Total Revenue Collected</div></div>
    <div class="summary-card blue"><div class="sc-icon">✅</div><div class="sc-value">${comp.length}</div><div class="sc-label">Completed Requests</div></div>
    <div class="summary-card yellow"><div class="sc-icon">⏳</div><div class="sc-value">${pend+proc}</div><div class="sc-label">Pending + Processing</div></div>
    <div class="summary-card red"><div class="sc-icon">🚫</div><div class="sc-value">${canc+rej}</div><div class="sc-label">Cancelled / Rejected</div></div>`;

  // Status bars
  const statuses=[{l:'Pending',c:pend,col:'#D97706'},{l:'Processing',c:proc,col:'#2563EB'},{l:'Completed',c:comp.length,col:'#16A34A'},{l:'Cancelled',c:canc,col:'#6B7280'},{l:'Rejected',c:rej,col:'#DC2626'}];
  const maxS = Math.max(...statuses.map(s=>s.c))||1;
  document.getElementById('status-prog').innerHTML = statuses.map(s=>`
    <div class="prog-row">
      <div class="prog-head"><span>${s.l}</span><span class="text-muted">${s.c} (${Math.round((s.c/reqs.length||0)*100)}%)</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${Math.round((s.c/maxS)*100)}%;background:${s.col};"></div></div>
    </div>`).join('');

  // Monthly chart
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now=new Date();
  const cd=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const cnt=reqs.filter(r=>{const rd=new Date(r.date_submitted);return rd.getMonth()===d.getMonth()&&rd.getFullYear()===d.getFullYear();}).length;
    cd.push({lbl:months[d.getMonth()],cnt});
  }
  const maxB=Math.max(...cd.map(c=>c.cnt))||1;
  document.getElementById('bar-chart').innerHTML=cd.map(c=>`<div class="chart-col"><div class="chart-bar" style="height:${Math.max(4,Math.round((c.cnt/maxB)*100))}%" title="${c.cnt}"></div><div class="chart-lbl">${c.lbl}</div></div>`).join('');

  // Revenue table
  const dtMap={};
  comp.forEach(r=>{ const dt=DB.docType(r.doc_type_id); if(!dt)return; if(!dtMap[dt.doc_type_id])dtMap[dt.doc_type_id]={name:dt.type_name,cnt:0,rev:0}; dtMap[dt.doc_type_id].cnt++; dtMap[dt.doc_type_id].rev+=dt.fee*r.quantity; });
  const rows=Object.values(dtMap).sort((a,b)=>b.rev-a.rev);
  document.getElementById('rev-tbody').innerHTML = rows.length
    ? rows.map(d=>`<tr><td class="fw-600">${d.name}</td><td>${d.cnt}</td><td class="fw-600" style="color:var(--green);">${fmtMoney(d.rev)}</td></tr>`).join('')
    : `<tr><td colspan="3"><div class="empty-state"><p>No completed requests yet.</p></div></td></tr>`;
}
</script>
</body>
</html>
