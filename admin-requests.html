<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Requests — UCC Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-col">
    <header class="topbar" id="topbar"></header>
    <div class="page-body">

      <div class="page-header">
        <div><h1>All Requests</h1><p>View and manage all certificate requests.</p></div>
      </div>

      <div id="flash" class="flash hidden"></div>

      <div class="card section">
        <div class="filter-bar">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" class="form-control" placeholder="Search by ref, student, document...">
          </div>
          <select id="status-filter" class="form-control" style="width:170px;">
            <option value="">All Status</option>
            <option value="pending">Pending</option>
            <option value="processing">Processing</option>
            <option value="ready">Ready</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Reference No.</th><th>Student</th><th>Document</th>
              <th>Urgency</th><th>Date Submitted</th><th>Status</th><th class="text-right">Actions</th>
            </tr></thead>
            <tbody id="req-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Update Status Modal -->
<div class="modal-backdrop" id="status-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>Update Request Status</h2>
      <button class="modal-close" data-close="status-modal">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Reference No.</label>
        <input type="text" id="m-ref" class="form-control" disabled>
      </div>
      <div class="form-group">
        <label>Current Status</label>
        <div id="m-cur-status"></div>
      </div>
      <div class="form-group">
        <label>New Status <span class="required">*</span></label>
        <select id="m-new-status" class="form-control">
          <option value="pending">Pending</option>
          <option value="processing">Processing</option>
          <option value="ready">Ready for Pickup</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
      <div class="form-group">
        <label>Note (Optional)</label>
        <textarea id="m-note" class="form-control" rows="3" placeholder="Reason or additional info..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="status-modal">Cancel</button>
      <button class="btn btn-primary" onclick="applyStatusUpdate()">Update Status</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
const user = requireLogin('admin');
let editingReqId = null;

if (user) {
  renderSidebar('admin','admin-requests.html');
  renderTopbar('All Requests');
  document.getElementById('search').addEventListener('input', renderTable);
  document.getElementById('status-filter').addEventListener('change', renderTable);
  renderTable();
}

function renderTable() {
  const q  = document.getElementById('search').value.toLowerCase();
  const sf = document.getElementById('status-filter').value;

  let reqs = MOCK.requests.sort((a,b)=>new Date(b.date_submitted)-new Date(a.date_submitted));
  if (sf) reqs = reqs.filter(r=>r.status===sf);
  if (q)  reqs = reqs.filter(r=>{
    const s=DB.user(r.student_id); const dt=DB.docType(r.doc_type_id);
    return (r.reference_no+' '+(s?.full_name||'')+' '+(dt?.type_name||'')).toLowerCase().includes(q);
  });

  const tbody = document.getElementById('req-tbody');
  if (!reqs.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📭</div><p>No requests found.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = reqs.map(r=>{
    const s=DB.user(r.student_id); const dt=DB.docType(r.doc_type_id);
    return `<tr>
      <td class="td-ref">${r.reference_no}</td>
      <td><div class="td-name-primary">${s?.full_name||'—'}</div><div class="td-name-secondary">${s?.student_id||''}</div></td>
      <td>${dt?.type_name||'—'}</td>
      <td>${pillHtml(r.urgency)}</td>
      <td>${fmtDate(r.date_submitted)}</td>
      <td>${pillHtml(r.status)}</td>
      <td class="text-right" style="white-space:nowrap;">
        <a href="request-detail.html?id=${r.request_id}" class="btn btn-secondary btn-sm">View</a>
        <button class="btn btn-primary btn-sm" onclick="openUpdate(${r.request_id})">Update</button>
      </td>
    </tr>`;
  }).join('');
}

function openUpdate(id) {
  const r = DB.request(id);
  if (!r) return;
  editingReqId = id;
  document.getElementById('m-ref').value = r.reference_no;
  document.getElementById('m-cur-status').innerHTML = pillHtml(r.status);
  document.getElementById('m-new-status').value = r.status;
  document.getElementById('m-note').value = '';
  openModal('status-modal');
}

function applyStatusUpdate() {
  const r = DB.request(editingReqId);
  if (!r) return;
  const newStatus = document.getElementById('m-new-status').value;
  const note      = document.getElementById('m-note').value.trim();
  const oldStatus = r.status;

  r.status      = newStatus;
  r.processed_by = user.user_id;
  if (newStatus === 'completed') r.date_completed = new Date().toISOString();

  MOCK.status_logs.push({
    log_id: Date.now(), request_id: r.request_id,
    changed_by: user.user_id, old_status: oldStatus, new_status: newStatus,
    note: note || `Status changed to ${newStatus}.`,
    changed_at: new Date().toISOString()
  });

  // Notify student
  const dt = DB.docType(r.doc_type_id);
  const msgs = { processing:'is now being processed', ready:'is ready for pickup!',
    completed:"has been completed — please pick it up at the Registrar's Office",
    cancelled:'has been cancelled', rejected:'has been rejected' };
  const label = msgs[newStatus] || `status changed to ${newStatus}`;
  MOCK.notifications.push({
    notif_id: Date.now(), user_id: r.student_id, request_id: r.request_id,
    message: `Your request ${r.reference_no} (${dt?.type_name||'document'}) ${label}.`,
    is_read: 0, created_at: new Date().toISOString()
  });

  closeModal('status-modal');
  renderTable();
  showFlash(`Status updated to "${capitalize(newStatus)}" successfully.`);
}
</script>
</body>
</html>
