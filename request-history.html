<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request History — UCC Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-col">
    <header class="topbar" id="topbar"></header>
    <div class="page-body">

      <div class="page-header">
        <div><h1>Request History</h1><p>Completed, cancelled, and rejected requests.</p></div>
      </div>

      <div class="card">
        <div class="filter-bar">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-inp" class="form-control" placeholder="Search history...">
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Reference No.</th><th>Document Type</th><th>Fee</th>
              <th>Date Submitted</th><th>Date Completed</th><th>Status</th><th>Action</th>
            </tr></thead>
            <tbody id="hist-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
const HIST = ['completed','cancelled','rejected'];
const user = requireLogin('student');
if (user) {
  renderSidebar('student','request-history.html');
  renderTopbar('Request History');
  document.getElementById('search-inp').addEventListener('input', renderTable);
  renderTable();
}

function renderTable() {
  if (!user) return;
  const q = document.getElementById('search-inp').value.toLowerCase();
  const reqs = DB.requestsByStudent(user.user_id)
    .filter(r=>HIST.includes(r.status))
    .sort((a,b)=>new Date(b.date_submitted)-new Date(a.date_submitted));
  const filtered = q ? reqs.filter(r=>{
    const dt=DB.docType(r.doc_type_id);
    return (r.reference_no+' '+(dt?.type_name||'')).toLowerCase().includes(q);
  }) : reqs;

  const tbody = document.getElementById('hist-tbody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📂</div><p>No completed requests yet.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(r=>{
    const dt=DB.docType(r.doc_type_id);
    const fee = dt ? fmtMoney(dt.fee * r.quantity) : '—';
    return `<tr>
      <td class="td-ref">${r.reference_no}</td>
      <td>${dt?.type_name||'—'}</td>
      <td>${fee}</td>
      <td>${fmtDate(r.date_submitted)}</td>
      <td>${fmtDate(r.date_completed)}</td>
      <td>${pillHtml(r.status)}</td>
      <td><a href="request-detail.html?id=${r.request_id}" class="btn btn-secondary btn-sm">View</a></td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
